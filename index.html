<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hetk Hetkes">
<meta name="theme-color" content="#1a0f2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Hetk Hetkes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg:      #1a0f2e;
    --bg2:     #221540;
    --bg3:     #2d1a52;
    --surface: #32205e;
    --border:  #4a2d7a;
    --accent:  #ff7a2f;
    --accent2: #c97aff;
    --text:    #f0eaff;
    --text2:   #b09acc;
    --text3:   #7a6098;
    --red:     #ff5a5a;
    --r:       16px;
    --rsm:     10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* AVAKUVA */
  #screen-home {
    background: var(--bg);
    justify-content: space-between;
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px) 0;
  }
  .home-header {
    padding: 28px 24px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: .15em; text-transform: uppercase; color: var(--text2);
  }
  .idea-count { font-size: 11px; color: var(--text3); letter-spacing: .05em; }
  .home-hero {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .hero-label { font-size: 11px; color: var(--text3); letter-spacing: .12em; text-transform: uppercase; }
  .capture-btn {
    width: 140px; height: 140px; border-radius: 50%;
    background: var(--surface); border: 2px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    cursor: pointer; transition: all .15s ease;
  }
  .capture-btn:active { transform: scale(.95); border-color: var(--accent); }
  .capture-icon { font-size: 36px; line-height: 1; }
  .capture-text {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--text2);
  }
  .home-nav { padding: 0 24px 12px; display: flex; gap: 12px; }
  .nav-btn {
    flex: 1; height: 48px;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--rsm);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text2); transition: all .15s;
  }
  .nav-btn:active { background: var(--bg3); border-color: var(--accent); color: var(--accent); }

  /* KAAMERA */
  #screen-camera { background: #000; position: relative; }
  #video-preview { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cam-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px) 0;
  }
  .cam-top { padding: 20px 24px; display: flex; justify-content: flex-end; }
  .cam-close {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; color: #fff;
  }
  .cam-bottom {
    padding: 0 24px 32px;
    display: flex; align-items: center; justify-content: center; gap: 40px;
  }
  .shutter-btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: #fff; border: 4px solid rgba(255,255,255,.4);
    cursor: pointer; transition: transform .1s;
    box-shadow: 0 0 0 2px rgba(255,255,255,.5);
  }
  .shutter-btn:active { transform: scale(.9); }
  .flip-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer; color: #fff;
  }
  .flash {
    position: fixed; inset: 0; background: #fff;
    opacity: 0; pointer-events: none; z-index: 999; transition: opacity .05s;
  }
  .flash.on { opacity: 1; }

  /* SALVESTA */
  #screen-save {
    background: var(--bg);
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px) 0;
  }
  .save-header {
    padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer;
  }
  .save-title {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; color: var(--text2);
  }
  .save-body {
    flex: 1; overflow-y: auto; padding: 0 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #captured-img {
    width: 100%; border-radius: var(--r); max-height: 300px;
    object-fit: cover; border: 1px solid var(--border); display: block;
  }
  .audio-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .audio-lbl { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text3); }
  .audio-row { display: flex; align-items: center; gap: 10px; }
  .rec-btn {
    flex: 1; height: 44px; border-radius: var(--rsm);
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; font-family: 'Syne', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text2); transition: all .15s;
  }
  .rec-btn.recording {
    background: rgba(255,90,90,.12); border-color: var(--red); color: var(--red);
    animation: pulse 1.5s ease infinite;
  }
  .rec-btn.done { border-color: var(--accent2); color: var(--accent2); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,90,90,.3); }
    50%      { box-shadow: 0 0 0 6px rgba(255,90,90,0); }
  }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .rec-btn.recording .rec-dot { animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .rec-timer {
    font-size: 11px; color: var(--red); letter-spacing: .1em; min-width: 38px; text-align: center;
  }
  .play-btn {
    width: 44px; height: 44px; border-radius: var(--rsm);
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; cursor: pointer; color: var(--text2); transition: all .15s;
  }
  .play-btn:active { border-color: var(--accent2); color: var(--accent2); }
  .hidden { display: none !important; }
  .save-actions { padding: 14px 24px; display: flex; gap: 10px; }
  .btn-save {
    flex: 1; height: 52px; border-radius: var(--r);
    background: linear-gradient(135deg, #ff7a2f, #ff5000);
    border: none; color: #fff; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-save:active { transform: scale(.97); opacity: .9; }
  .btn-discard {
    width: 52px; height: 52px; border-radius: var(--r);
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; color: var(--text3); transition: all .15s;
  }
  .btn-discard:active { border-color: var(--red); color: var(--red); }

  /* GALERII */
  #screen-gallery {
    background: var(--bg);
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px) 0;
    display: flex; flex-direction: column;
  }
  .gallery-header {
    padding: 20px 24px 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .gallery-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .gallery-count { font-size: 11px; color: var(--text3); }
  .gallery-list {
    flex: 1; overflow-y: auto; padding: 0 24px 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .gallery-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--text3); padding: 48px; text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: .35; }
  .empty-text { font-size: 13px; line-height: 1.6; }
  .idea-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden; cursor: pointer;
    display: flex; align-items: stretch; min-height: 72px; transition: border-color .15s;
  }
  .idea-card:active { border-color: var(--accent2); }
  .card-thumb { width: 72px; min-height: 72px; flex-shrink: 0; object-fit: cover; display: block; }
  .card-thumb-empty {
    width: 72px; min-height: 72px; flex-shrink: 0;
    background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 22px;
  }
  .card-body { flex: 1; padding: 12px; display: flex; align-items: center; gap: 10px; }
  .card-time { font-size: 11px; color: var(--text2); flex: 1; }
  .card-audio { font-size: 11px; color: var(--accent2); }

  /* DETAIL */
  #screen-detail {
    background: var(--bg);
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px) 0;
    display: flex; flex-direction: column;
  }
  .detail-header {
    padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .detail-time { font-size: 11px; color: var(--text3); letter-spacing: .06em; }
  .detail-del {
    width: 36px; height: 36px; border-radius: 50%;
    background: transparent; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; cursor: pointer; color: var(--text3); transition: all .15s;
  }
  .detail-del:active { border-color: var(--red); color: var(--red); }
  .detail-body {
    flex: 1; overflow-y: auto; padding: 0 24px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #detail-img { width: 100%; border-radius: var(--r); border: 1px solid var(--border); display: block; }
  .detail-audio {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .detail-play {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #c97aff, #9a3fff);
    border: none; display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; flex-shrink: 0; transition: opacity .15s;
  }
  .detail-play:active { opacity: .8; }
  .detail-audio-lbl { font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
  .detail-audio-dur { font-size: 14px; color: var(--text); margin-top: 3px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom,20px) + 90px);
    left: 50%; transform: translateX(-50%) translateY(16px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--rsm); padding: 10px 20px;
    font-size: 12px; letter-spacing: .04em;
    opacity: 0; transition: all .22s ease;
    pointer-events: none; white-space: nowrap; z-index: 1000;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* DIALOG */
  .dialog-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 500; display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .dialog-bg.show { opacity: 1; pointer-events: all; }
  .dialog-box {
    width: 100%; background: var(--bg2);
    border-top: 1px solid var(--border); border-radius: 20px 20px 0 0;
    padding: 24px 24px calc(env(safe-area-inset-bottom,20px) + 24px);
    transform: translateY(100%); transition: transform .25s ease;
  }
  .dialog-bg.show .dialog-box { transform: translateY(0); }
  .dialog-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .dialog-body { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .dialog-actions { display: flex; flex-direction: column; gap: 10px; }
  .dialog-btn {
    width: 100%; height: 50px; border-radius: var(--r); border: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .15s;
  }
  .dialog-btn.danger { background: rgba(255,90,90,.12); border-color: var(--red); color: var(--red); }
  .dialog-btn.cancel { background: var(--surface); color: var(--text2); }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<!-- AVAKUVA -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <span class="app-title">Hetk Hetkes</span>
    <span class="idea-count" id="home-count">0 ideed</span>
  </div>
  <div class="home-hero">
    <span class="hero-label">Püüa hetk</span>
    <div class="capture-btn" id="btn-open-camera">
      <span class="capture-icon">📸</span>
      <span class="capture-text">Pildista</span>
    </div>
  </div>
  <div class="home-nav">
    <div class="nav-btn" id="btn-gallery"><span>🗂</span><span>Galerii</span></div>
    <div class="nav-btn" id="btn-close" style="flex:0;width:48px"><span>✕</span></div>
  </div>
</div>

<!-- KAAMERA -->
<div class="screen" id="screen-camera">
  <video id="video-preview" autoplay playsinline muted></video>
  <div class="cam-overlay">
    <div class="cam-top">
      <div class="cam-close" id="btn-cam-close">✕</div>
    </div>
    <div class="cam-bottom">
      <div class="flip-btn" id="btn-flip">🔄</div>
      <div class="shutter-btn" id="btn-shutter"></div>
      <div style="width:48px"></div>
    </div>
  </div>
</div>

<!-- SALVESTA -->
<div class="screen" id="screen-save">
  <div class="save-header">
    <div class="back-btn" id="btn-save-back">←</div>
    <span class="save-title">Uus idee</span>
  </div>
  <div class="save-body">
    <img id="captured-img" src="" alt="">
    <div class="audio-box">
      <div class="audio-lbl">Häälkommentaar</div>
      <div class="audio-row">
        <div class="rec-btn" id="btn-record">
          <span class="rec-dot"></span>
          <span id="rec-label">Alusta salvestust</span>
        </div>
        <span class="rec-timer hidden" id="rec-timer">0:00</span>
        <div class="play-btn hidden" id="btn-play-rec">▶</div>
      </div>
    </div>
  </div>
  <div class="save-actions">
    <button class="btn-save" id="btn-save-idea"><span>💾</span><span>Salvesta idee</span></button>
    <div class="btn-discard" id="btn-discard">🗑</div>
  </div>
</div>

<!-- GALERII -->
<div class="screen" id="screen-gallery">
  <div class="gallery-header">
    <span class="gallery-title">Ideed</span>
    <span class="gallery-count" id="gallery-count">0</span>
  </div>
  <div class="gallery-list" id="gallery-list"></div>
  <div class="home-nav" style="padding:8px 24px 12px">
    <div class="nav-btn" id="btn-gallery-back"><span>←</span><span>Tagasi</span></div>
  </div>
</div>

<!-- DETAIL -->
<div class="screen" id="screen-detail">
  <div class="detail-header">
    <div class="back-btn" id="btn-detail-back">←</div>
    <span class="detail-time" id="detail-time"></span>
    <div class="detail-del" id="btn-delete">🗑</div>
  </div>
  <div class="detail-body">
    <img id="detail-img" src="" alt="" class="hidden">
    <div class="detail-audio hidden" id="detail-audio">
      <button class="detail-play" id="btn-detail-play">▶</button>
      <div>
        <div class="detail-audio-lbl">Häälkommentaar</div>
        <div class="detail-audio-dur" id="detail-dur">—</div>
      </div>
    </div>
  </div>
</div>

<!-- KUSTUTAMISE DIALOG -->
<div class="dialog-bg" id="dialog">
  <div class="dialog-box">
    <div class="dialog-title">Kustuta idee?</div>
    <div class="dialog-body">Pilt ja häälkommentaar kustutatakse jäädavalt.</div>
    <div class="dialog-actions">
      <button class="dialog-btn danger" id="btn-confirm-del">Kustuta</button>
      <button class="dialog-btn cancel" id="btn-cancel-del">Tühista</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// DB
const DB_NAME = 'HetkeHetked';
let db;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('ideed')) {
        d.createObjectStore('ideed', { keyPath: 'id' })
         .createIndex('aeg', 'aeg', { unique: false });
      }
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror   = e => rej(e);
  });
}
function dbAdd(item) {
  return new Promise((res, rej) => {
    const tx = db.transaction('ideed', 'readwrite');
    tx.objectStore('ideed').add(item);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
function dbAll() {
  return new Promise((res, rej) => {
    const tx = db.transaction('ideed', 'readonly');
    const r  = tx.objectStore('ideed').index('aeg').getAll();
    r.onsuccess = e => res(e.target.result.reverse());
    r.onerror   = rej;
  });
}
function dbDel(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('ideed', 'readwrite');
    tx.objectStore('ideed').delete(id);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

// Olek
let videoStream = null;
let facingMode  = 'environment';
let capturedImg = null;
let recorder    = null;
let audioChunks = [];
let audioBlob   = null;
let audioURL    = null;
let recInterval = null;
let recSecs     = 0;
let detailId    = null;
let detailAudio = null;

// Navigatsioon
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Avakuva
async function refreshHome() {
  try {
    const all = await dbAll();
    const n = all.length;
    document.getElementById('home-count').textContent =
      n === 0 ? '0 ideed' : n === 1 ? '1 idee' : n + ' ideed';
  } catch(e) {}
}

// Kaamera
async function openCamera() {
  try {
    stopCamera();
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoStream = stream;
    const v = document.getElementById('video-preview');
    v.srcObject = stream;
    try { await v.play(); } catch(_) {}
    show('camera');
  } catch(e) {
    toast('Kaamera viga: ' + (e.message || e.name));
  }
}

function stopCamera() {
  if (!videoStream) return;
  videoStream.getTracks().forEach(t => t.stop());
  videoStream = null;
  document.getElementById('video-preview').srcObject = null;
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await openCamera();
}

function takePicture() {
  const v = document.getElementById('video-preview');
  const w = v.videoWidth  || 640;
  const h = v.videoHeight || 480;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(v, 0, 0, w, h);

  const fl = document.getElementById('flash');
  fl.classList.add('on');
  setTimeout(() => fl.classList.remove('on'), 150);

  capturedImg = c.toDataURL('image/jpeg', 0.80);
  document.getElementById('captured-img').src = capturedImg;
  stopCamera();
  resetAudio();
  show('save');
}

// Heli
function resetAudio() {
  if (recorder && recorder.state !== 'inactive') recorder.stop();
  recorder = null;
  clearInterval(recInterval); recInterval = null;
  audioChunks = []; audioBlob = null;
  if (audioURL) { URL.revokeObjectURL(audioURL); audioURL = null; }
  recSecs = 0;
  document.getElementById('btn-record').className = 'rec-btn';
  document.getElementById('rec-label').textContent = 'Alusta salvestust';
  document.getElementById('rec-timer').classList.add('hidden');
  document.getElementById('btn-play-rec').classList.add('hidden');
}

async function toggleRec() {
  if (recorder && recorder.state === 'recording') {
    recorder.stop();
    clearInterval(recInterval); recInterval = null;
    document.getElementById('btn-record').className = 'rec-btn done';
    document.getElementById('rec-label').textContent = 'Salvestus valmis ✓';
    document.getElementById('rec-timer').classList.add('hidden');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioChunks = [];

    let mime = '';
    const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
    for (const t of types) {
      if (typeof MediaRecorder !== 'undefined' && MediaRecorder.isTypeSupported(t)) { mime = t; break; }
    }

    recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) audioChunks.push(e.data); };
    recorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      audioBlob = new Blob(audioChunks, { type: mime || 'audio/webm' });
      audioURL  = URL.createObjectURL(audioBlob);
      document.getElementById('btn-play-rec').classList.remove('hidden');
    };
    recorder.start(200);
    recSecs = 0;

    document.getElementById('btn-record').className = 'rec-btn recording';
    document.getElementById('rec-label').textContent = 'Peata salvestus';
    document.getElementById('rec-timer').classList.remove('hidden');
    document.getElementById('rec-timer').textContent = '0:00';

    recInterval = setInterval(() => {
      recSecs++;
      const m = Math.floor(recSecs / 60);
      const s = recSecs % 60;
      document.getElementById('rec-timer').textContent = m + ':' + String(s).padStart(2,'0');
    }, 1000);
  } catch(e) {
    toast('Mikrofon: ' + (e.message || e.name));
  }
}

function playRec() {
  if (!audioURL) return;
  new Audio(audioURL).play().catch(() => toast('Taasesitus ebaõnnestus'));
}

// Salvesta
async function saveIdee() {
  if (!capturedImg) { toast('Pilt puudub'); return; }

  let heliData = null, heliSecs = 0, heliType = null;
  if (audioBlob) {
    heliData = await toB64(audioBlob);
    heliSecs = recSecs;
    heliType = audioBlob.type;
  }

  const idee = {
    id: Date.now(), aeg: Date.now(),
    pilt: capturedImg,
    heli: heliData, heliSecs, heliType
  };

  try {
    await dbAdd(idee);
    capturedImg = null;
    resetAudio();
    await refreshHome();
    show('home');
    toast('Idee salvestatud ✓');
  } catch(e) {
    toast('Salvestamine ebaõnnestus');
  }
}

function toB64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// Galerii
async function openGallery() {
  const all  = await dbAll();
  const list = document.getElementById('gallery-list');
  document.getElementById('gallery-count').textContent = all.length;

  if (all.length === 0) {
    list.innerHTML = '<div class="gallery-empty"><span class="empty-icon">💡</span><span class="empty-text">Ideid pole veel.<br>Vajuta ja püüa oma esimene hetk.</span></div>';
  } else {
    list.innerHTML = all.map(i => {
      const thumb = i.pilt
        ? '<img class="card-thumb" src="' + i.pilt + '" alt="">'
        : '<div class="card-thumb-empty">💡</div>';
      const audio = i.heliSecs
        ? '<span class="card-audio">🎙 ' + fmtDur(i.heliSecs) + '</span>' : '';
      return '<div class="idea-card" data-id="' + i.id + '">' + thumb +
        '<div class="card-body"><span class="card-time">' + fmtTime(i.aeg) + '</span>' + audio + '</div></div>';
    }).join('');
    list.querySelectorAll('.idea-card').forEach(el =>
      el.addEventListener('click', () => openDetail(+el.dataset.id))
    );
  }
  show('gallery');
}

// Detail
async function openDetail(id) {
  const all  = await dbAll();
  const idee = all.find(i => i.id === id);
  if (!idee) return;
  detailId = id;

  document.getElementById('detail-time').textContent = fmtFull(idee.aeg);

  const img = document.getElementById('detail-img');
  if (idee.pilt) { img.src = idee.pilt; img.classList.remove('hidden'); }
  else           { img.classList.add('hidden'); }

  const abox = document.getElementById('detail-audio');
  if (idee.heli) {
    abox.classList.remove('hidden');
    document.getElementById('detail-dur').textContent = fmtDur(idee.heliSecs);
    if (detailAudio) { detailAudio.pause(); detailAudio = null; }
    const blob = b64Blob(idee.heli, idee.heliType || 'audio/webm');
    detailAudio = new Audio(URL.createObjectURL(blob));
  } else {
    abox.classList.add('hidden');
    detailAudio = null;
  }
  show('detail');
}

function b64Blob(b64, type) {
  const bin = atob(b64.split(',')[1]);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type });
}

// Kustuta
function showDialog()  { document.getElementById('dialog').classList.add('show'); }
function hideDialog()  { document.getElementById('dialog').classList.remove('show'); }

async function doDelete() {
  await dbDel(detailId);
  if (detailAudio) { detailAudio.pause(); detailAudio = null; }
  hideDialog();
  await refreshHome();
  toast('Idee kustutatud');
  await openGallery();
}

// Abifunktsioonid
function fmtTime(ts) {
  const d = Date.now() - ts;
  if (d < 60e3)    return 'Äsja';
  if (d < 3600e3)  return Math.floor(d/60e3)  + ' min tagasi';
  if (d < 86400e3) return Math.floor(d/3600e3) + ' h tagasi';
  return new Date(ts).toLocaleDateString('et-EE', { day:'numeric', month:'short' });
}
function fmtFull(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('et-EE', { day:'numeric', month:'long', year:'numeric' })
       + ' · ' + d.toLocaleTimeString('et-EE', { hour:'2-digit', minute:'2-digit' });
}
function fmtDur(s) {
  if (!s) return '0:00';
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

// Sündmused
document.getElementById('btn-open-camera').addEventListener('click', openCamera);
document.getElementById('btn-gallery').addEventListener('click', openGallery);
document.getElementById('btn-close').addEventListener('click', () => window.close());

document.getElementById('btn-shutter').addEventListener('click', takePicture);
document.getElementById('btn-flip').addEventListener('click', flipCamera);
document.getElementById('btn-save-back').addEventListener('click', () => { resetAudio(); capturedImg = null; show('home'); });
document.getElementById('btn-record').addEventListener('click', toggleRec);
document.getElementById('btn-play-rec').addEventListener('click', playRec);
document.getElementById('btn-save-idea').addEventListener('click', saveIdee);
document.getElementById('btn-discard').addEventListener('click', () => { resetAudio(); capturedImg = null; show('home'); });
document.getElementById('btn-gallery-back').addEventListener('click', () => show('home'));
document.getElementById('btn-detail-back').addEventListener('click', () => { if (detailAudio) detailAudio.pause(); openGallery(); });
document.getElementById('btn-detail-play').addEventListener('click', () => {
  if (!detailAudio) return;
  detailAudio.currentTime = 0;
  detailAudio.play().catch(() => toast('Taasesitus ebaõnnestus'));
});
document.getElementById('btn-delete').addEventListener('click', showDialog);
document.getElementById('btn-confirm-del').addEventListener('click', doDelete);
document.getElementById('btn-cancel-del').addEventListener('click', hideDialog);
document.getElementById('dialog').addEventListener('click', e => {
  if (e.target === document.getElementById('dialog')) hideDialog();
});

// Käivitus
openDB().then(refreshHome).catch(() => toast('Andmebaasi viga'));

if ('serviceWorker' in navigator && !location.hostname.includes('claudeusercontent')) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}
